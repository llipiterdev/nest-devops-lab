# Identificación del proyecto (debe coincidir con el proyecto en SonarQube)
sonar.projectKey=nest-devops-lab
sonar.projectName=Nest DevOps Lab

# Código fuente y tests
sonar.sources=src
sonar.tests=test

# Exclusiones (no analizar)
sonar.exclusions=**/node_modules/**,**/dist/,**/*.spec.ts

# Cobertura (Jest genera coverage/lcov.info)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8